<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <title>Игры дня</title>
  <!-- webapp-build: 26 -->
  <style>
    .hidden {
      display: none !important;
    }
    .game-view.hidden,
    .hub.hidden {
      display: none !important;
      pointer-events: none !important;
    }
    .game-view.hidden {
      pointer-events: none !important;
    }
    .hub {
      position: relative;
      z-index: 10;
    }
    .game-view {
      z-index: 3;
    }
    html,
    body {
      margin: 0;
      min-height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      min-height: var(--tg-viewport-stable-height, 100dvh);
    }
  </style>
  <link rel="stylesheet" href="./styles.css?v=28" />
</head>
<body>
  <section id="viewHub" class="hub" aria-label="Выбор игры">
    <header class="hub-header">
      <h1 class="hub-title">Игры дня</h1>
      <p class="hub-subtitle">У каждой игры — одно задание в сутки</p>
    </header>
    <ul class="hub-list">
      <li>
        <button type="button" class="hub-card hub-card--active" data-game="wordle">
          <span class="hub-card-icon" aria-hidden="true">▦</span>
          <span class="hub-card-text">
            <span class="hub-card-name">5 букв</span>
            <span class="hub-card-desc">Угадай слово из пяти букв</span>
          </span>
        </button>
      </li>
      <li>
        <button type="button" class="hub-card hub-card--active" data-game="associations">
          <span class="hub-card-icon" aria-hidden="true">◎</span>
          <span class="hub-card-text">
            <span class="hub-card-name">Ассоциации</span>
            <span class="hub-card-desc">Четыре группы по четыре слова</span>
          </span>
        </button>
      </li>
      <li>
        <button type="button" class="hub-card hub-card--active" data-game="cryptogram">
          <span class="hub-card-icon" aria-hidden="true">⌗</span>
          <span class="hub-card-text">
            <span class="hub-card-name">Криптограмма</span>
            <span class="hub-card-desc">Буквы по числам, фраза дня</span>
          </span>
        </button>
      </li>
      <li>
        <button type="button" class="hub-card hub-card--soon" data-game="soon">
          <span class="hub-card-icon" aria-hidden="true">◇</span>
          <span class="hub-card-text">
            <span class="hub-card-name">Игра 4</span>
            <span class="hub-card-desc">В разработке</span>
          </span>
          <span class="hub-badge">Скоро</span>
        </button>
      </li>
      <li>
        <button type="button" class="hub-card hub-card--soon" data-game="soon">
          <span class="hub-card-icon" aria-hidden="true">◇</span>
          <span class="hub-card-text">
            <span class="hub-card-name">Игра 5</span>
            <span class="hub-card-desc">В разработке</span>
          </span>
          <span class="hub-badge">Скоро</span>
        </button>
      </li>
    </ul>
  </section>

  <div id="viewWordle" class="game-view hidden">
    <header class="game-toolbar">
      <button type="button" class="game-toolbar-back js-back-to-hub" id="backToMenu" aria-label="В меню игр">
        ← Меню
      </button>
      <span class="game-toolbar-title">5 букв</span>
    </header>
    <main class="app">
      <input
        id="hiddenInput"
        class="hidden-input"
        maxlength="5"
        autocomplete="off"
        autocapitalize="none"
        inputmode="none"
      />
      <div class="badge" id="dayBadge">СЛОВО ДНЯ №1</div>

      <section class="board" id="board"></section>

      <section class="result hidden" id="resultBlock">
        <p class="result-title" id="resultTitle"></p>
        <p class="result-subtitle" id="resultSubtitle"></p>
      </section>

      <section class="status" id="status"></section>

      <div class="controls" id="controlsBlock">
        <button id="guessBtn">Проверить</button>
      </div>
      <section class="keyboard" id="keyboard"></section>
    </main>
  </div>

  <div id="viewAssociations" class="game-view hidden">
    <header class="game-toolbar">
      <button type="button" class="game-toolbar-back js-back-to-hub" id="backFromAssociations" aria-label="В меню игр">
        ← Меню
      </button>
      <span class="game-toolbar-title">Ассоциации</span>
    </header>
    <main class="assoc-app">
      <p class="assoc-debug hidden" id="assocDebugLine" role="status"></p>
      <p class="assoc-lead" id="assocMistakes">Ошибки: 0/4</p>
      <p class="assoc-hint" id="assocStatus">Выберите 4 связанных слова и нажмите «Проверить»</p>
      <section id="assocFound" class="assoc-found" aria-live="polite"></section>
      <section id="assocGrid" class="assoc-grid" aria-label="Слова"></section>
      <div class="assoc-actions">
        <button type="button" class="assoc-btn assoc-btn--secondary" id="assocResetBtn">Сбросить выбор</button>
        <button type="button" class="assoc-btn assoc-btn--primary" id="assocCheckBtn" disabled>Проверить</button>
      </div>
      <div class="assoc-test hidden" id="assocTestControls">
        <button type="button" class="assoc-btn assoc-btn--secondary assoc-btn--full" id="assocRestartBtn">
          Начать эту головоломку заново
        </button>
      </div>
      <div class="game-bottom-bar game-bottom-bar--assoc">
        <button type="button" class="game-bottom-back js-back-to-hub">К меню игр</button>
      </div>
    </main>
  </div>

  <div id="viewCryptogram" class="game-view hidden">
    <header class="game-toolbar">
      <button type="button" class="game-toolbar-back js-back-to-hub" id="backFromCryptogram" aria-label="В меню игр">
        ← Меню
      </button>
      <span class="game-toolbar-title">Криптограмма</span>
    </header>
    <main class="crypto-app">
      <input
        id="cryptoHiddenInput"
        class="hidden-input"
        type="text"
        maxlength="8"
        autocomplete="off"
        autocapitalize="none"
        inputmode="none"
        readonly
        tabindex="-1"
        lang="ru"
        aria-label="Ввод буквы"
      />
      <div class="crypto-scroll">
        <p class="assoc-debug hidden" id="cryptoDebugLine" role="status"></p>
        <p class="assoc-lead" id="cryptoMistakes">Ошибки: 0/3</p>
        <p class="assoc-hint" id="cryptoStatus">Выберите клетку и букву</p>
        <section id="cryptoField" class="crypto-field" aria-label="Шифр"></section>
      </div>
      <div class="crypto-dock">
        <div class="crypto-actions">
          <button type="button" class="assoc-btn assoc-btn--secondary" id="cryptoPrevBtn" aria-label="Предыдущая клетка">
            ←
          </button>
          <button type="button" class="assoc-btn assoc-btn--secondary" id="cryptoNextBtn" aria-label="Следующая клетка">
            →
          </button>
          <button type="button" class="assoc-btn assoc-btn--secondary" id="cryptoEraseBtn" style="display:none">Стереть</button>
          <button type="button" class="assoc-btn assoc-btn--primary" id="cryptoCheckBtn">Прогресс</button>
        </div>
        <section id="cryptoKeyboard" class="crypto-keyboard" aria-label="Буквы"></section>
      </div>
      <div class="assoc-test hidden" id="cryptoTestControls">
        <button type="button" class="assoc-btn assoc-btn--secondary assoc-btn--full" id="cryptoRestartBtn">
          Начать эту головоломку заново
        </button>
      </div>
      <div class="game-bottom-bar game-bottom-bar--assoc">
        <button type="button" class="game-bottom-back js-back-to-hub">К меню игр</button>
      </div>
    </main>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./tg-init.js?v=28"></script>
  <script src="./app.js?v=28"></script>
  <script src="./associations.js?v=28"></script>
  <script src="./hub.js?v=28"></script>
</body>
</html>
