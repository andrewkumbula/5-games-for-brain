services:
  fiveletters-static:
    image: nginx:alpine
    container_name: fiveletters-static
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /opt/fiveletters/webapp:/usr/share/nginx/html/webapp:ro
      - /opt/fiveletters/words.json:/usr/share/nginx/html/words.json:ro
      - /opt/fiveletters/deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - n8n_default
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_default
      - traefik.http.routers.fiveletters.rule=Host(`wordle.kumbuland.ru`)
      - traefik.http.routers.fiveletters.entrypoints=websecure
      - traefik.http.routers.fiveletters.tls=true
      - traefik.http.routers.fiveletters.tls.certresolver=letsencrypt
      - traefik.http.services.fiveletters.loadbalancer.server.port=80

networks:
  n8n_default:
    external: true
