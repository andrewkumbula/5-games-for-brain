server {
    listen 80;
    server_name wordle.kumbuland.ru;

    root /opt/fiveletters;
    index index.html;

    # Mini App files
    location /webapp/ {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
    }

    # Dictionary for Mini App
    location = /words.json {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }
}
